[toolchain]
anchor_version = "1.0.2"

[features]
resolution = true
skip-lint = false

[programs.localnet]
arena = "6YSSWe8Sj5Xcoc3gRKtWLnMAwxF7aeKHmxi4Kha5YywC"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Plain local-validator mocha for now (the anchor-counter template's
# ../fullstack-test.sh needs the ephemeral validator; delegation tests
# come in a later task). Mirrors the ts-mocha line fullstack-test.sh runs.
#
# RUN AS:  ~/.avm/bin/anchor-1.0.2 test --validator legacy
# (anchor 1.0 defaults to surfpool, which is not installed; `--validator
# legacy` uses solana-test-validator. Plain `anchor` on PATH is 0.31.1 —
# never use it here.)
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Devnet SOLUSD feed snapshot (Spike B dump) loaded at its real address so
# local tests exercise the same account the program reads on devnet/mainnet.
# Static data — tests must init the config with a huge max_age_secs.
[[test.validator.account]]
address = "ENYwebBThHzmzwPLAQvCucUTsjyfBSZdD9ViXksS4jPu"
filename = "tests/fixtures/solusd-feed.json"
